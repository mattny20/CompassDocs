# CompassDocs Enterprise — production stack (app + Postgres).
#
# Same as docker-compose.yml, but runs the Enterprise image and accepts a
# license key. The image is public (no docker login); enterprise features unlock
# only with a valid license. Installed via:
#   curl -fsSL https://raw.githubusercontent.com/mattny20/CompassDocs/main/install.sh | COMPASSDOCS_EDITION=enterprise bash
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: compassdocs
    volumes:
      - compassdocs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass -d compassdocs"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ghcr.io/mattny20/compassdocs-ee:${COMPASSDOCS_EE_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://compass:${POSTGRES_PASSWORD}@db:5432/compassdocs
      DATABASE_SSL: disable
      # Set to 1 ONLY if serving over plain HTTP (no HTTPS) — otherwise login
      # loops, because Secure cookies aren't sent over http://. Leave unset for
      # any HTTPS / internet-facing deployment.
      COMPASSDOCS_INSECURE_COOKIES: ${COMPASSDOCS_INSECURE_COOKIES:-}
      # Enterprise license — set in .env, or leave blank and apply it in the app
      # under Settings → License. A key set in the UI takes precedence.
      COMPASSDOCS_LICENSE_KEY: ${COMPASSDOCS_LICENSE_KEY:-}
      COMPASSDOCS_ADMIN_USER: ${COMPASSDOCS_ADMIN_USER:-}
      COMPASSDOCS_ADMIN_PASSWORD: ${COMPASSDOCS_ADMIN_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      BACKUP_AZURE_CONNECTION_STRING: ${BACKUP_AZURE_CONNECTION_STRING:-}
      BACKUP_AZURE_CONTAINER: ${BACKUP_AZURE_CONTAINER:-}
    volumes:
      - compassdocs_backups:/backups
      - compassdocs_uploads:/uploads
    ports:
      - "${PORT:-3000}:3000"

volumes:
  compassdocs_pgdata:
  compassdocs_backups:
  compassdocs_uploads:
