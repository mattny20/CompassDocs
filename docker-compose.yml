# Local development database for CompassDocs.
#
#   docker compose up -d        # start Postgres in the background
#   docker compose down         # stop it (data is kept in the named volume)
#   docker compose down -v      # stop it AND wipe the database
#
# Then point the app at it in your .env:
#   DATABASE_URL=postgres://compass:compass@localhost:5432/compassdocs
# and run `npm run dev`.
services:
  db:
    image: postgres:16
    container_name: compassdocs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: compass
      POSTGRES_DB: compassdocs
    ports:
      - "5432:5432"
    volumes:
      - compassdocs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass -d compassdocs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  compassdocs_pgdata:
