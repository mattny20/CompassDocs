# Automated dependency update PRs. Grouped weekly to keep noise down;
# security updates arrive as soon as an advisory lands regardless.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
