name: Release

# On a version tag (vX.Y.Z), publish a GitHub Release using that version's
# section of CHANGELOG.md as the notes. The container image for the tag is built
# separately by docker-publish.yml. Publishing a Release is what powers the
# in-app "update available" check (Settings → System).
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && (/^## \[/ || /^\[[0-9]/) { exit }
            capture { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > notes.md
          fi
          echo "----- release notes -----"; cat notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md
